<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Weave lattice mark">
  <title>Weave lattice (plain weave)</title>
  <!-- weft bars (coral), horizontal -->
  <g fill="#FF7E6B">
    <rect x="12" y="17" width="76" height="16" rx="8"/>
    <rect x="12" y="42" width="76" height="16" rx="8"/>
    <rect x="12" y="67" width="76" height="16" rx="8"/>
  </g>
  <!-- warp bars (indigo), vertical, drawn over -->
  <g fill="#5B4BE3">
    <rect x="17" y="12" width="16" height="76" rx="8"/>
    <rect x="42" y="12" width="16" height="76" rx="8"/>
    <rect x="67" y="12" width="16" height="76" rx="8"/>
  </g>
  <!-- re-assert weft over warp at alternating crossings for the over-under weave -->
  <g fill="#FF7E6B">
    <rect x="41" y="17" width="18" height="16"/>
    <rect x="16" y="42" width="18" height="16"/>
    <rect x="66" y="42" width="18" height="16"/>
    <rect x="41" y="67" width="18" height="16"/>
  </g>
</svg>
